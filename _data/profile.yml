short_bio: >-
  <p>
    I am currently a Camera Design Lead at Apple, where I work on camera hardware design, integration, and validation for high-performance imaging systems.
  </p>
  <p>
    Previously, I completed my PhD in Electrical and Computer Engineering at UW–Madison in the
    <a href="https://www.compoptics.wisc.edu/">Computational Optics Lab</a>, where I was fortunate to be advised by
    <a href="https://biostat.wisc.edu/~velten/">Andreas Velten</a>. My doctoral research focused on computational imaging systems that combine optical hardware, emerging sensor technologies, and advanced reconstruction algorithms for applications including 3D imaging, non-line-of-sight imaging, and transient imaging.
  </p>

